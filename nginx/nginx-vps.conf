# ─── Nexo Fitness — referencia para instalación directa en VPS ──────────────
#
# Distribución pública esperada:
# - https://nexofitness.cl        → landing comercial y contacto
# - https://www.nexofitness.cl    → redirect canónico a apex
# - https://app.nexofitness.cl    → SPA para owners, staff y clientes
# - https://admin.nexofitness.cl  → SPA para superadmin
# - https://landing.nexofitness.cl → redirect legacy a apex (archivo separado)
#
# Este archivo replica la disposición activa del host.
# El redirect legacy de landing vive en nginx/landing.nexofitness.host.conf

server {
    listen 80;
    listen [::]:80;
    server_name nexofitness.cl www.nexofitness.cl;

    return 301 https://nexofitness.cl$request_uri;
}

server {
    listen 80;
    listen [::]:80;
    server_name app.nexofitness.cl admin.nexofitness.cl;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.nexofitness.cl;

    ssl_certificate /etc/ssl/cloudflare/nexofitness.cl.pem;
    ssl_certificate_key /etc/ssl/cloudflare/nexofitness.cl.key;

    return 301 https://nexofitness.cl$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name nexofitness.cl;

    root /var/www/nexofitness/landing;
    index index.html;

    ssl_certificate /etc/ssl/cloudflare/nexofitness.cl.pem;
    ssl_certificate_key /etc/ssl/cloudflare/nexofitness.cl.key;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml font/woff2;

    location ~* \.(?:js|css|woff2?|png|jpg|jpeg|gif|svg|ico|webp)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
        try_files $uri =404;
    }

    location = /index.html {
        expires off;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
        try_files $uri =404;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    location = /health {
        proxy_pass http://127.0.0.1:8000/health;
        access_log off;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name app.nexofitness.cl admin.nexofitness.cl;

    root /var/www/nexofitness/frontend/dist;
    index index.html;
    client_max_body_size 20m;

    ssl_certificate /etc/ssl/cloudflare/nexofitness.cl.pem;
    ssl_certificate_key /etc/ssl/cloudflare/nexofitness.cl.key;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml font/woff2;

    location ~* \.(?:js|css|woff2?|png|jpg|jpeg|gif|svg|ico|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location ~* \.(?:webmanifest|json)$ {
        expires off;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri =404;
    }

    location = /sw.js {
        expires off;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri =404;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_request_buffering off;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    location = /health {
        proxy_pass http://127.0.0.1:8000/health;
        access_log off;
    }

    location ^~ /uploads/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        expires 30d;
        add_header Cache-Control "public";
        add_header Access-Control-Allow-Origin "*";
    }

    location = /docs  { return 404; }
    location = /redoc { return 404; }

    location ~* \.html$ {
        expires off;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri /index.html;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
