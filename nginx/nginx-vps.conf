# ─── Nexo Fitness — Nginx para instalación directa en VPS ────────────────────
#
# USO: copiar a /etc/nginx/sites-available/nexo-fitness
#      ajustar DOMINIO, rutas de SSL y ruta al frontend/dist
#
# Luego:
#   sudo ln -s /etc/nginx/sites-available/nexo-fitness /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# DOMINIO: reemplazar app.nexofitness.com con el dominio real
# SSL con Certbot: sudo certbot --nginx -d app.nexofitness.com
# SSL con Cloudflare origin cert: colocar crt/key en /etc/nginx/ssl/
# ─────────────────────────────────────────────────────────────────────────────

# Rate limiting zones (deben estar en http{} del nginx.conf principal)
# Si ya están definidas en /etc/nginx/nginx.conf, eliminar estas líneas:
limit_req_zone $binary_remote_addr zone=nexo_api:10m  rate=30r/s;
limit_req_zone $binary_remote_addr zone=nexo_auth:10m rate=5r/s;

# ─── HTTP → HTTPS redirect ───────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name nexofitness.cl www.nexofitness.cl;

    location / {
        return 301 https://$host$request_uri;
    }
}

# ─── HTTPS principal ─────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name nexofitness.cl www.nexofitness.cl;

    # ── SSL (Cloudflare Origin Certificate) ──────────────────────────────────
    ssl_certificate     /etc/ssl/cloudflare/nexofitness.cl.pem;
    ssl_certificate_key /etc/ssl/cloudflare/nexofitness.cl.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # ── Upload limit ─────────────────────────────────────────────────────────
    client_max_body_size 10M;

    # ── Security headers ──────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options          "SAMEORIGIN"                                  always;
    add_header X-Content-Type-Options   "nosniff"                                     always;
    add_header X-XSS-Protection         "1; mode=block"                               always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin"             always;
    add_header Permissions-Policy       "camera=(), microphone=(), geolocation=()"    always;
    add_header Content-Security-Policy  "default-src 'self'; script-src 'self' 'unsafe-inline' https://js.stripe.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' https://api.stripe.com https://js.stripe.com https://*.fintoc.com; frame-src https://js.stripe.com https://hooks.stripe.com https://*.fintoc.com; worker-src 'self' blob:; manifest-src 'self';" always;

    # ── Gzip ──────────────────────────────────────────────────────────────────
    gzip            on;
    gzip_vary       on;
    gzip_proxied    any;
    gzip_comp_level 6;
    gzip_types      text/plain text/css application/json application/javascript
                    text/xml application/xml image/svg+xml font/woff2;

    # ── Frontend estático ─────────────────────────────────────────────────────
    # Ruta al build de producción (ajustar si el repo está en otro path)
    root /var/www/nexofitness/frontend/dist;
    index index.html;

    # Assets con hash: cache larga (Vite los genera con contenthash en el nombre)
    location ~* \.(?:js|css|woff2?|png|jpg|jpeg|gif|svg|ico|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Service Worker y manifest: nunca cachear
    location ~* \.(?:webmanifest|json)$ {
        expires off;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri =404;
    }

    location = /sw.js {
        expires off;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri =404;
    }

    # SPA fallback (React Router)
    location / {
        try_files $uri /index.html;
    }

    # ── API proxy → backend Docker (127.0.0.1:8000) ───────────────────────────
    location /api/ {
        limit_req zone=nexo_api burst=20 nodelay;
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Auth: rate limit más estricto
    location /api/v1/auth/ {
        limit_req zone=nexo_auth burst=5 nodelay;
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Health check
    location = /health {
        proxy_pass http://127.0.0.1:8000;
        access_log off;
    }

    # Uploaded files (logos, etc.) — served directly, no auth
    location ^~ /uploads/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Connection        "";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        expires 30d;
        add_header Cache-Control "public";
        add_header Access-Control-Allow-Origin "*";
    }

    # API docs bloqueados en producción
    location = /docs  { return 404; }
    location = /redoc { return 404; }

    # Webhooks: sin rate limit, verificación de firma en backend
    location /api/v1/payments/stripe/webhook {
        proxy_pass         http://127.0.0.1:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    location /api/v1/payments/fintoc/webhook {
        proxy_pass         http://127.0.0.1:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }
}
