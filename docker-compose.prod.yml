# docker-compose.prod.yml — Stack de producción
#
# Solo servicios de backend. El frontend se sirve como archivos estáticos
# directamente desde Nginx instalado en el host (ver nginx/nginx-vps.conf).
#
# Uso:
#   docker compose -f docker-compose.prod.yml up -d
#   docker compose -f docker-compose.prod.yml run --rm backend alembic upgrade head
#
# Variables requeridas en backend/.env:
#   DATABASE_URL, REDIS_URL, SECRET_KEY, JWT_SECRET_KEY,
#   SENDGRID_API_KEY, STRIPE_SECRET_KEY, WEB_PUSH_VAPID_*, etc.

services:
  # ─── PostgreSQL ──────────────────────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       nexo_fitness
      POSTGRES_USER:     nexo
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Debes definir POSTGRES_PASSWORD en el entorno}
    volumes:
      - pgdata:/var/lib/postgresql/data
    # Puerto expuesto solo en localhost del VPS para usarlo vía túnel SSH
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexo -d nexo_fitness"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ─── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redisdata:/data
    # Puerto NO expuesto al exterior
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  # ─── Backend (FastAPI) ───────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: ../docker/Dockerfile.backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://nexo:${POSTGRES_PASSWORD}@db:5432/nexo_fitness
      REDIS_URL:    redis://redis:6379/0
      UPLOADS_DIR:  /app/uploads
    # Solo escuchar en localhost — Nginx del host hace el proxy
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ./backend/uploads:/app/uploads
      - /etc/nexofitness/sii:/etc/nexofitness/sii:ro
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    # 2 workers async para aprovechar múltiples vCPUs
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2

  # ─── Celery Worker ───────────────────────────────────────────────────────────
  worker:
    build:
      context: ./backend
      dockerfile: ../docker/Dockerfile.backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://nexo:${POSTGRES_PASSWORD}@db:5432/nexo_fitness
      REDIS_URL:    redis://redis:6379/0
      UPLOADS_DIR:  /app/uploads
    volumes:
      - ./backend/uploads:/app/uploads
      - /etc/nexofitness/sii:/etc/nexofitness/sii:ro
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A app.tasks worker --loglevel=info --concurrency=2

  # ─── Celery Beat ─────────────────────────────────────────────────────────────
  beat:
    build:
      context: ./backend
      dockerfile: ../docker/Dockerfile.backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://nexo:${POSTGRES_PASSWORD}@db:5432/nexo_fitness
      REDIS_URL:    redis://redis:6379/0
      UPLOADS_DIR:  /app/uploads
    volumes:
      - ./backend/uploads:/app/uploads
      - /etc/nexofitness/sii:/etc/nexofitness/sii:ro
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A app.tasks beat --loglevel=info

volumes:
  pgdata:
  redisdata:
