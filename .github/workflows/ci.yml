name: CI / Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true   # Cancela runs anteriores en PRs; en main no aplica (push es secuencial)

jobs:
  # ──────────────────────────────────────────────────────────────────────────────
  # 1. Tests del backend (pytest + migraciones)
  # ──────────────────────────────────────────────────────────────────────────────
  backend-tests:
    name: Backend (pytest)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: nexo
          POSTGRES_PASSWORD: nexo_password
          POSTGRES_DB: nexo_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run migrations
        env:
          DATABASE_URL: postgresql+asyncpg://nexo:nexo_password@localhost:5432/nexo_test
          SECRET_KEY: ci-test-secret-key-not-for-production
          JWT_SECRET_KEY: ci-test-jwt-secret-key-not-for-production
          SUPERADMIN_PASSWORD: CiTestAdmin123!
        run: alembic upgrade head

      - name: Run tests
        env:
          DATABASE_URL: postgresql+asyncpg://nexo:nexo_password@localhost:5432/nexo_test
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: ci-test-secret-key-not-for-production
          JWT_SECRET_KEY: ci-test-jwt-secret-key-not-for-production
          SUPERADMIN_PASSWORD: CiTestAdmin123!
          APP_ENV: testing
          DEBUG: "true"
        run: pytest -v --tb=short

  # ──────────────────────────────────────────────────────────────────────────────
  # 2. Lint + typecheck del frontend
  # ──────────────────────────────────────────────────────────────────────────────
  frontend-lint:
    name: Frontend (lint + typecheck)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

  # ──────────────────────────────────────────────────────────────────────────────
  # 3. Deploy a producción (solo en push a main, después de tests verdes)
  # ──────────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    environment: production
    needs: [backend-tests, frontend-lint]
    # Solo ejecutar en push a main, no en PRs
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PRODUCTION_HOST }}
          username: ${{ secrets.PRODUCTION_USER }}
          key: ${{ secrets.PRODUCTION_SSH_KEY }}
          script: |
            set -e
            cd ${{ secrets.PRODUCTION_APP_DIR }}

            echo "=== Pulling latest code ==="
            git pull origin main

            echo "=== Building frontend ==="
            cd frontend
            npm ci --prefer-offline
            npm run build
            cd ..

            echo "=== Building backend image ==="
            docker compose -f docker-compose.prod.yml build backend

            echo "=== Running migrations ==="
            docker compose -f docker-compose.prod.yml run --rm backend alembic upgrade head

            echo "=== Restarting services ==="
            docker compose -f docker-compose.prod.yml up -d --remove-orphans

            echo "=== Reload Nginx (nuevos estáticos) ==="
            sudo systemctl reload nginx

            echo "=== Health check ==="
            sleep 5
            curl -fsS http://127.0.0.1:8000/health | grep '"status":"healthy"' || exit 1

            echo "=== Deploy complete ==="
